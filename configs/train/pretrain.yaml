# Training hyperparameters for MAE pretraining.
#
# Direct port of He et al. 2022 hyperparameters with batch size scaled
# down to a single-GPU budget. DO NOT tune these in Phase 2 — they work,
# and tuning them is a Phase-5-scale undertaking. The ablation (Days 15-19)
# varies mask_ratio, patch_samples, and total_steps only.

# ---- Steps & batching -------------------------------------------------
total_steps: 1_200_000        # ~2-3 days on A100/4090-class single GPU
warmup_steps: 60_000        # 5% of total
batch_size: 64              # per-GPU; reduced from 256 to fit 8 GB (RTX 5060).
                            # NOTE: base_lr below is calibrated for 256 — scale up
                            # batch (and LR) on larger GPUs (A100/5090, >=32 GB).
num_workers: 8
prefetch_factor: 2

# ---- Optimizer (AdamW, He et al. 2022) --------------------------------
base_lr: 3.75e-5
min_lr: 0.0
weight_decay: 0.05
betas: [0.9, 0.95]
eps: 1.0e-8
grad_clip: 1.0

# ---- Mixed precision --------------------------------------------------
# bf16 on Ampere+/Hopper. Falls back to fp16 with GradScaler if you set
# amp=fp16. Use fp32 only for debugging.
amp: bf16

# ---- Checkpointing ----------------------------------------------------
ckpt_dir: ${oc.env:NEUROSTREAM_CKPT_DIR,checkpoints/phase2_pretrain}
rolling_interval: 40_000
rolling_keep: 3
milestones: [200_000, 400_000, 600_000, 800_000, 1_200_000]
auto_resume: true

# ---- Reproducibility --------------------------------------------------
seed: 0
