name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: "3.14"

    - run: uv sync --locked --all-groups

    - name: Ruff linting
      run: uv run ruff check .

    - name: Mypy type checking
      run: uv run mypy .

    - name: Tests
      run: uv run pytest -q
